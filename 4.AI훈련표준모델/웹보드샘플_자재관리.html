<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>경남경총 AI표준모델 - 자재관리 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background-color: #121217; color: #e4e4e7; font-family: 'Malgun Gothic', sans-serif; padding-bottom: 50px; }
        .glass-card { background: rgba(30, 30, 40, 0.65); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 12px; padding: 20px; margin-bottom: 25px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); }
        .status-box { border-left: 5px solid #3b82f6; }
        .status-box.warning { border-left: 5px solid #ef4444; background: rgba(239, 68, 68, 0.1); }
        .table { color: #e4e4e7; }
        .table th { background-color: rgba(50, 50, 65, 0.8) !important; color: #ffffff !important; }
        .table td { background-color: transparent !important; border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
        .form-control, .form-select { background-color: rgba(50, 50, 65, 0.5); border: 1px solid rgba(255, 255, 255, 0.1); color: #ffffff; }
        .form-control:focus, .form-select:focus { background-color: rgba(50, 50, 65, 0.8); color: #ffffff; border-color: #3b82f6; box-shadow: none; }
        .btn-primary { background-color: #2563eb; border: none; transition: all 0.3s ease; }
        .btn-primary:hover { background-color: #1d4ed8; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="container mt-4" id="pdf-area">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3 border-secondary">
        <div>
            <span class="badge bg-primary mb-2">경남경총 중소기업AI훈련확산센터</span>
            <h1 class="h2 fw-bold text-white">Smart 자재 수급 관리 웹보드</h1>
        </div>
        <div class="no-print d-flex gap-2">
            <button class="btn btn-outline-light fw-bold" onclick="downloadTemplate()">📂 자재수급 양식 다운로드</button>
            <button class="btn btn-success fw-bold" onclick="downloadPDF()">📋 보고서 PDF 다운로드</button>
        </div>
    </div>

    <div class="row">
        <div class="col-md-4"><div id="box-total-items" class="glass-card status-box"><h6 class="text-muted text-uppercase">전체 등록 자재수</h6><h2 class="fw-bold m-0" id="txt-total-items">0종</h2></div></div>
        <div class="col-md-4"><div id="box-total-qty" class="glass-card status-box" style="border-left-color: #10b981;"><h6 class="text-muted text-uppercase">창고 총 재고 수량</h6><h2 class="fw-bold m-0" id="txt-total-qty">0개</h2></div></div>
        <div class="col-md-4"><div id="box-warning" class="glass-card status-box" style="border-left-color: #f59e0b;"><h6 class="text-muted text-uppercase">안전재고 미달 품목</h6><h2 class="fw-bold m-0 text-warning" id="txt-warning-count">0종</h2></div></div>
    </div>

    <div class="row">
        <div class="col-md-4 no-print">
            <div class="glass-card">
                <h5 class="fw-bold mb-3 text-primary">자재 수급 변동 등록</h5>
                <form id="material-form" onsubmit="addLog(event)">
                    <div class="mb-3"><label class="form-label">품목명</label><input type="text" id="itemName" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">수급 구분</label><select id="logType" class="form-select" required><option value="입고">구매 입고 (+)</option><option value="출고">생산 출고 (-)</option></select></div>
                    <div class="mb-3"><label class="form-label">수량</label><input type="number" id="itemQty" class="form-control" min="1" required></div>
                    <div class="mb-3"><label class="form-label">거래처 / 사용부서</label><input type="text" id="targetCompany" class="form-control" required></div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">데이터 등록 및 검증</button>
                </form>
            </div>

            <div class="glass-card mt-3">
                <h5 class="fw-bold mb-3 text-warning">📁 사내 첨부문서 스토리지</h5>
                <div class="mb-3">
                    <input type="file" id="file-input" class="form-control form-control-sm" onchange="uploadFile()">
                </div>
                <ul class="list-group list-group-flush bg-transparent" id="file-list" style="max-height: 120px; overflow-y: auto; font-size: 14px;">
                    </ul>
            </div>
        </div>

        <div class="col-md-8">
            <div class="glass-card" style="height: 565px;">
                <h5 class="fw-bold mb-3 text-primary">주요 자재별 실시간 재고 현황 (Chart.js)</h5>
                <div style="position: relative; height:460px; width:100%"><canvas id="inventoryChart"></canvas></div>
            </div>
        </div>
    </div>

    <div class="row mt-2">
        <div class="col-md-12">
            <div class="glass-card">
                <h5 class="fw-bold mb-3 text-white">자재 수급 변동 기록</h5>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead><tr><th>일시</th><th>품목명</th><th>구분</th><th>수량</th><th>거래처/부서</th><th>상태 알림</th></tr></thead>
                        <tbody id="data-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const defaultData = [
        { date: "2026-06-12 10:15", name: "엔진 변속 기어", type: "입고", qty: 50, company: "(주)우주정밀" },
        { date: "2026-06-13 14:20", name: "실린더 블록", type: "입고", qty: 8, company: "(주)경남기계" }
    ];

    let storageLogs = JSON.parse(localStorage.getItem("ai_model_logs")) || defaultData;
    let uploadedFiles = JSON.parse(localStorage.getItem("inventory_files")) || [];
    let myChart = null;

    function updateDashboard() {
        const tableBody = document.getElementById("data-table-body");
        tableBody.innerHTML = "";
        let totalQtyMap = {}, totalItems = new Set(), warnings = 0, grandTotalQty = 0;

        storageLogs.forEach(log => {
            totalItems.add(log.name);
            if (!totalQtyMap[log.name]) totalQtyMap[log.name] = 0;
            totalQtyMap[log.name] += (log.type === "입고" ? log.qty : -log.qty);
        });

        storageLogs.slice().reverse().forEach(log => {
            const currentStock = totalQtyMap[log.name];
            const isDanger = currentStock <= 10;
            const tr = document.createElement("tr");
            if(isDanger) tr.style.backgroundColor = "rgba(239, 68, 68, 0.15)";
            tr.innerHTML = `<td>${log.date}</td><td class="fw-bold">${log.name}</td><td><span class="badge ${log.type === '입고' ? 'bg-primary' : 'bg-info'}">${log.type}</span></td><td>${log.qty} 개</td><td>${log.company}</td><td>${isDanger ? '<span class="badge bg-danger">안전재고 미달!</span>' : '<span class="badge bg-success">정상</span>'}</td>`;
            tableBody.appendChild(tr);
        });

        Object.keys(totalQtyMap).forEach(key => { grandTotalQty += totalQtyMap[key]; if (totalQtyMap[key] <= 10) warnings++; });
        document.getElementById("txt-total-items").innerText = totalItems.size + " 종";
        document.getElementById("txt-total-qty").innerText = grandTotalQty + " 개";
        document.getElementById("txt-warning-count").innerText = warnings + " 종";
        
        const warningBox = document.getElementById("box-warning");
        if(warnings > 0) warningBox.classList.add("warning"); else warningBox.classList.remove("warning");

        updateChart(totalQtyMap);
        renderFileList();
    }

    function updateChart(stockData) {
        const ctx = document.getElementById('inventoryChart').getContext('2d');
        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: Object.keys(stockData),
                datasets: [{ label: '보유 재고량', data: Object.values(stockData), backgroundColor: Object.values(stockData).map(v => v <= 10 ? 'rgba(239, 68, 68, 0.6)' : 'rgba(59, 130, 246, 0.6)'), borderWidth: 0 }]
            },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, ticks: { color: '#e4e4e7' } }, x: { ticks: { color: '#e4e4e7' } } }, plugins: { legend: { labels: { color: '#e4e4e7' } } } }
        });
    }

    function addLog(e) {
        e.preventDefault();
        const now = new Date();
        storageLogs.push({
            date: `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,
            name: document.getElementById("itemName").value, type: document.getElementById("logType").value, qty: parseInt(document.getElementById("itemQty").value), company: document.getElementById("targetCompany").value
        });
        localStorage.setItem("ai_model_logs", JSON.stringify(storageLogs));
        updateDashboard();
        document.getElementById("material-form").reset();
    }

    // [기능추가 로직] 파일 업로드 (Base64 변환 후 LocalStorage 보관)
    function uploadFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            uploadedFiles.push({ name: file.name, size: (file.size / 1024).toFixed(1) + " KB", data: e.target.result });
            localStorage.setItem("inventory_files", JSON.stringify(uploadedFiles));
            renderFileList();
            fileInput.value = "";
        };
        reader.readAsDataURL(file);
    }

    function renderFileList() {
        const fileListHTML = document.getElementById('file-list');
        fileListHTML.innerHTML = uploadedFiles.length === 0 ? '<li class="text-muted text-center" style="list-style:none;">첨부된 문서 없음</li>' : '';
        uploadedFiles.forEach((file, index) => {
            const li = document.createElement('li');
            li.className = "list-group-item bg-transparent border-secondary text-white d-flex justify-content-between align-items-center p-1";
            li.innerHTML = `<a href="${file.data}" download="${file.name}" class="text-warning text-decoration-none text-truncate" style="max-width:180px;">📄 ${file.name}</a><button class="btn btn-sm text-danger p-0 border-0" onclick="deleteFile(${index})">❌</button>`;
            fileListHTML.appendChild(li);
        });
    }

    function deleteFile(index) {
        uploadedFiles.splice(index, 1);
        localStorage.setItem("inventory_files", JSON.stringify(uploadedFiles));
        renderFileList();
    }

    // [기능추가 로직] 사내 표준 양식 가이드 다운로드 (Text 파일 자동 생성기)
    function downloadTemplate() {
        const textContent = "============= [경남경총 표준 양식] 자재 수급 점검 현황표 =============\n\n점검 일자: 2026년    월    일\n점검자 명: \n\n[점검 품목 리스트]\n1. 품목명:                     | 규격:               | 안전재고 수량: 10개\n2. 입고 변동 사유 및 거래처 명세:\n\n위 자재의 이상 유무를 점검하고 표준 웹보드 시스템에 등록 바랍니다.";
        const blob = new Blob([textContent], { type: "text/plain;charset=utf-8" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "사내표준_자재수급_점검양식.txt";
        link.click();
    }

    function downloadPDF() {
        const element = document.getElementById('pdf-area');
        const style = document.createElement('style');
        style.id = "pdf-print-style";
        style.innerHTML = '.no-print { display: none !important; } body { background-color: #ffffff; color: #000000; } .glass-card { background: #f8f9fa; color: #000000; border: 1px solid #dee2e6; box-shadow: none; }';
        document.head.appendChild(style);
        html2pdf().from(element).set({ margin: 10, filename: '자재수급보고서.pdf', html2canvas: { scale: 2, backgroundColor: '#ffffff' }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' } }).save().then(() => { document.getElementById("pdf-print-style").remove(); });
    }

    window.onload = updateDashboard;
</script>
</body>
</html>
