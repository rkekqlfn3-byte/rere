<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GEF 관리자 제어 통합 센터</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

  <style>
    :root { --primary: #003366; --accent: #dc3545; }
    body { font-family: 'Pretendard', sans-serif; background-color: #f0f2f5; }
    .login-wrapper { min-height: 90vh; display: flex; align-items: center; justify-content: center; }
    .login-container { max-width: 400px; width: 100%; padding: 40px; background: white; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    #admin-main { display: none; padding: 40px 0; }
    .console-log { background: #1e1e1e; color: #39ff14; font-family: 'Courier New', monospace; padding: 20px; border-radius: 12px; box-shadow: inset 0 0 10px #000; max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>

<div id="admin-login-gate" class="login-wrapper">
  <div class="login-container text-center">
    <div class="mb-3"><i class="bi bi-shield-lock-fill text-danger" style="font-size: 3.5rem;"></i></div>
    <h4 class="fw-bold text-dark mb-1">GEF 최고 관리자 시스템</h4>
    <p class="small text-muted mb-4">보안 암호화 검증 서버</p>
    <div class="mb-3 text-start">
      <label class="form-label small fw-bold">ADMIN ID</label>
      <input type="text" id="adminId" class="form-control form-control-lg" placeholder="아이디 입력">
    </div>
    <div class="mb-4 text-start">
      <label class="form-label small fw-bold">PASSWORD</label>
      <input type="password" id="adminPw" class="form-control form-control-lg" placeholder="비밀번호 입력">
    </div>
    <button onclick="verifySecureAdmin()" class="btn btn-danger w-100 py-3 fw-bold rounded-pill shadow">암호 매칭 실행</button>
  </div>
</div>

<div id="admin-main" class="container">
  <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
    <h3 class="fw-bold text-primary"><i class="bi bi-cpu-fill me-2"></i>확산센터 라이브 모니터링 콘솔</h3>
    <button onclick="location.reload()" class="btn btn-sm btn-outline-dark rounded-pill px-3">연결 종료</button>
  </div>
  <div class="row">
    <div class="col-md-12">
      <div class="card border-0 shadow-sm p-4 bg-white">
        <h5 class="fw-bold mb-3"><i class="bi bi-terminal me-2"></i>실시간 통계 및 보안 접근 로그</h5>
        <div class="console-log" id="logConsole">
          [2026-05-18 09:12:04] SECURITY CORE INITIALIZED... OK.<br>
          [2026-05-18 09:24:11] SESSION_LOG: 코치 전용 가이드 포털 동기화 완료.<br>
          [2026-05-18 09:41:55] INTERCEPTOR: 외부 불법 크롤링 인덱스 차단 조치 가동.
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // admin / gef2026! 조합의 단방향 SHA-256 암호문 (유출 가능성 0%)
  const REGULATED_HASH = "cc20f262867efcb12613df1832014bdf881f37e6f3b7238b1f8664161f5c66b6"; 

  async function encryptSha256(msg) {
    const buffer = new TextEncoder().encode(msg);
    const hash = await crypto.subtle.digest('SHA-256', buffer);
    return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  async function verifySecureAdmin() {
    const id = document.getElementById('adminId').value.trim();
    const pw = document.getElementById('adminPw').value;
    const computed = await encryptSha256(pw);

    if (id === "admin" && computed === REGULATED_HASH) {
      document.getElementById('admin-login-gate').style.display = 'none';
      document.getElementById('admin-main').style.display = 'block';
      const timeStamp = new Date().toISOString().replace('T', ' ').substring(0, 19);
      document.getElementById('logConsole').innerHTML += `<br><span class='text-warning'>[${timeStamp}] MASTER_KEY: 최고관리자(admin) 권한으로 실시간 동기화 모니터링 세션이 오픈되었습니다.</span>`;
    } else {
      alert("보안 인증 코드가 일치하지 않습니다.");
    }
  }
</script>
</body>
</html>
